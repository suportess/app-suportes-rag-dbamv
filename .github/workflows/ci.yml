name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build & Push imagem Docker
    uses: suportess/suportes-workflow/.github/workflows/docker-build.yml@main
    with:
      app_name: app-suportes-rag-dbamv
      dockerfile_path: Dockerfile
      context: .
      platforms: linux/amd64
    secrets:
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

  deploy:
    needs: build
    uses: suportess/suportes-workflow/.github/workflows/docker-deploy.yml@main
    with:
      app_name: app-suportes-rag-dbamv
      deploy_path: /opt/apps/app-suportes-rag-dbamv
    secrets:
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      APP_ENV: ${{ secrets.APP_ENV }}
